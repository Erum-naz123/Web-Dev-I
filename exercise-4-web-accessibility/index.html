<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wondering Photographer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Skip link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <h1>The Wondering Photographer</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Basket</a></li>
                <li><a href="#">Checkout</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <!-- Image Card 1 -->
        <section class="photo-card">
            <figure>
                <img src="images/WaterfallPhoto.jpg" alt="Cold ocean water near the coast of Greenland">
                <figcaption>
                    This was from a fabulous trip to the coast of Greenland with my family. 
                    The water was lovely but very cold!
                </figcaption>
            </figure>
            <button aria-label="Add Greenland coast photo to basket">Add to Basket</button>
        </section>

        <!-- Image Card 2 -->
        <section class="photo-card">
            <figure>
                <img src="images/BridgePhoto.jpg" alt="Golden Gate Bridge in San Francisco">
                <figcaption>
                    A picture of the Golden Gate Bridge. New York! New York!
                </figcaption>
            </figure>
            <button aria-label="Add Golden Gate Bridge photo to basket">Add to Basket</button>
        </section>

        <!-- Image Card 3 -->
        <section class="photo-card">
            <figure>
                <img src="images/OceanPhoto.jpg" alt="River valley in Greenland where a glacier once existed">
                <figcaption>
                    Another great photo from Greenland. It's a river valley where a glacier used to be.
                </figcaption>
            </figure>
            <button aria-label="Add Greenland valley photo to basket">Add to Basket</button>
        </section>

        <!-- Image Card 4 -->
        <section class="photo-card">
            <figure>
                <img src="images/WaterfallPhoto.jpg" alt="Waterfall surrounded by greenery">
                <figcaption>
                    The waterfall made such a lovely sound. I could have fallen asleep!
                </figcaption>
            </figure>
            <button aria-label="Add waterfall photo to basket">Add to Basket</button>
        </section>

    </main>

    <footer>
        <p>&copy; The Wondering Photographer 2018.</p>
    </footer>

</body>
</html>
